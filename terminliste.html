<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVK Ungdom terminliste</title>

    <!-- Ikoner -->
    <link rel="icon" type="image/png" sizes="32x32" href="TVK.png">
    <link rel="apple-touch-icon" sizes="180x180" href="TVK.png">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* ===========================
           GENERELT
           =========================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #F4F6F9;
            color: #194794;
        }

        /* ===========================
           NAVIGASJON
           =========================== */
        .nav {
            background: #ffffff;
            border-bottom: 3px solid #E2071D;
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            box-shadow: 0 2px 12px rgba(25, 71, 148, 0.08);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-logo {
            height: 40px;
            width: auto;
            object-fit: contain;
        }

        .nav-logo-fallback {
            width: 40px;
            height: 40px;
            background: #194794;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 800;
            font-size: 14px;
            border: 2px solid #E2071D;
            flex-shrink: 0;
        }

        .nav-title {
            font-size: 18px;
            font-weight: 700;
            color: #194794;
        }

        .nav-title span { color: #E2071D; }

        .nav-links {
            display: flex;
            gap: 4px;
        }

        .nav-link {
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            color: #4a6aa5;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background: rgba(25, 71, 148, 0.06);
            color: #194794;
        }

        .nav-link.active {
            color: #E2071D;
            background: rgba(226, 7, 29, 0.06);
            font-weight: 600;
        }

        /* ===========================
           STATISTIKK-STRIPE
           =========================== */
        .stats-bar {
            background: #ffffff;
            border-bottom: 1px solid #dce3ed;
            padding: 10px 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 32px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #4a6aa5;
        }

        .stat-item strong {
            font-size: 18px;
            font-weight: 800;
            color: #E2071D;
        }

        /* ===========================
           HOVEDLAYOUT
           =========================== */
        .main-container {
            display: flex;
            height: calc(100vh - 110px);
        }

        /* ===========================
           SIDEBAR
           =========================== */
        .sidebar {
            width: 400px;
            background: #ffffff;
            overflow-y: auto;
            border-right: 1px solid #dce3ed;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 16px 20px;
            background: #ffffff;
            border-bottom: 1px solid #dce3ed;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .filter-btn {
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid #b8c7de;
            background: transparent;
            color: #4a6aa5;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .filter-btn:hover, .filter-btn.active {
            border-color: #E2071D;
            color: #E2071D;
            background: rgba(226, 7, 29, 0.06);
        }

        .filter-btn.active-all {
            background: #E2071D;
            color: #ffffff;
            border-color: #E2071D;
            font-weight: 600;
        }

        /* ===========================
           RITT-KORT
           =========================== */
        .ritt-list { padding: 8px; }

        .ritt-card {
            background: #F4F6F9;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.25s;
            border: 1px solid #e2e8f0;
            position: relative;
            overflow: hidden;
        }

        .ritt-card:hover {
            border-color: #b8c7de;
            transform: translateX(4px);
            box-shadow: 0 4px 16px rgba(25, 71, 148, 0.1);
        }

        .ritt-card.highlighted {
            border-color: #E2071D;
            box-shadow: 0 0 16px rgba(226, 7, 29, 0.12);
            background: #fff;
        }

        .ritt-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 6px;
        }

        .ritt-name {
            font-size: 14px;
            font-weight: 600;
            color: #194794;
            padding-left: 8px;
        }

        .ritt-category-badge {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .ritt-details {
            padding-left: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 12px;
            color: #4a6aa5;
        }

        .ritt-detail-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .ritt-detail-item svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        .no-location-card {
            background: linear-gradient(135deg, #ffffff, #F4F6F9);
            border: 1px dashed #b8c7de;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 8px;
            opacity: 0.6;
        }

        .no-location-card .ritt-name { color: #8a9cc2; }

        /* ===========================
           KART
           =========================== */
        .map-container {
            flex: 1;
            position: relative;
        }

        #map { width: 100%; height: 100%; }

        /* ===========================
           LEGENDE
           =========================== */
        .legend {
            position: absolute;
            bottom: 24px;
            right: 24px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            padding: 16px 20px;
            z-index: 1000;
            border: 1px solid #dce3ed;
            min-width: 200px;
            box-shadow: 0 4px 20px rgba(25, 71, 148, 0.1);
        }

        .legend h4 {
            font-size: 13px;
            color: #194794;
            margin-bottom: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
            font-size: 12px;
            color: #3a5a8c;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 2px solid rgba(25, 71, 148, 0.15);
        }

        /* ===========================
           LEGENDE TOGGLE-KNAPP (mobil)
           =========================== */
        .legend-toggle {
            display: none;
            position: absolute;
            bottom: 24px;
            right: 16px;
            z-index: 1001;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            border: 1px solid #dce3ed;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(25, 71, 148, 0.15);
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #194794;
            transition: all 0.2s;
        }

        .legend-toggle:hover {
            background: #ffffff;
            box-shadow: 0 4px 24px rgba(25, 71, 148, 0.2);
        }

        .legend-toggle.active {
            background: #194794;
            color: #ffffff;
            border-color: #194794;
        }

        /* ===========================
           RUTE-INFO
           =========================== */
        .route-info {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 12px 24px;
            z-index: 1000;
            border: 1px solid #dce3ed;
            font-size: 13px;
            color: #194794;
            text-align: center;
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(25, 71, 148, 0.1);
        }

        .route-info strong { color: #E2071D; }

        /* ===========================
           POPUP
           =========================== */
        .custom-popup .leaflet-popup-content-wrapper {
            background: #ffffff;
            color: #194794;
            border-radius: 12px;
            border: 1px solid #dce3ed;
            box-shadow: 0 10px 40px rgba(25, 71, 148, 0.15);
        }

        .custom-popup .leaflet-popup-tip {
            background: #ffffff;
            border: 1px solid #dce3ed;
        }

        .custom-popup .leaflet-popup-content {
            margin: 14px 16px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .popup-title {
            font-size: 15px;
            font-weight: 700;
            color: #194794;
            margin-bottom: 8px;
        }

        .popup-info {
            font-size: 12px;
            color: #4a6aa5;
            line-height: 1.8;
        }

        .popup-info strong { color: #194794; }

        .popup-badge {
            display: inline-block;
            font-size: 10px;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        /* ===========================
           KARTMARKØRER
           =========================== */
        .marker-pin {
            width: 32px;
            height: 32px;
            border-radius: 50% 50% 50% 0;
            position: absolute;
            transform: rotate(-45deg);
            left: 50%;
            top: 50%;
            margin: -20px 0 0 -16px;
            border: 3px solid rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .marker-pin .marker-number {
            transform: rotate(45deg);
            font-size: 12px;
            font-weight: 800;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .pulse-ring {
            border-radius: 50%;
            height: 40px;
            width: 40px;
            position: absolute;
            left: 50%;
            top: 50%;
            margin: -20px 0 0 -20px;
            animation: pulsate 2s ease-out infinite;
            opacity: 0;
        }

        @keyframes pulsate {
            0%   { transform: scale(0.5); opacity: 0; }
            50%  { opacity: 0.2; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* ===========================
           SCROLLBAR
           =========================== */
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-track { background: #F4F6F9; }
        .sidebar::-webkit-scrollbar-thumb { background: #b8c7de; border-radius: 3px; }
        .sidebar::-webkit-scrollbar-thumb:hover { background: #8a9cc2; }

        /* ===========================
           RESPONSIVT
           =========================== */
        @media (max-width: 768px) {
            .nav {
                padding: 8px 12px;
                height: auto;
                flex-wrap: wrap;
                gap: 6px;
            }

            .nav-left {
                gap: 8px;
            }

            .nav-logo {
                height: 32px;
            }

            .nav-title {
                font-size: 15px;
            }

            .nav-links {
                width: 100%;
                justify-content: center;
                gap: 2px;
            }

            .nav-link {
                padding: 6px 10px;
                font-size: 12px;
            }

            .main-container {
                flex-direction: column;
                height: auto;
                min-height: calc(100vh - 100px);
            }

            .sidebar {
                width: 100%;
                height: auto;
                max-height: 45vh;
                min-height: 200px;
                border-right: none;
                border-bottom: 2px solid #dce3ed;
                order: 2;
            }

            .map-container {
                width: 100%;
                height: 55vh;
                min-height: 300px;
                order: 1;
            }

            .stats-bar { display: none; }

            /* Skjul legenden som standard på mobil */
            .legend {
                display: none;
                bottom: 76px;
                right: 16px;
                left: 16px;
                min-width: unset;
                padding: 12px 16px;
            }

            .legend.visible {
                display: block;
            }

            /* Vis toggle-knappen på mobil */
            .legend-toggle {
                display: flex;
            }

            .route-info {
                font-size: 11px;
                padding: 6px 12px;
                top: 12px;
                border-radius: 8px;
                max-width: calc(100% - 32px);
            }

            .sidebar-header {
                padding: 12px 14px;
            }

            .filter-buttons {
                gap: 4px;
            }

            .filter-btn {
                padding: 4px 10px;
                font-size: 10px;
            }

            .ritt-card {
                padding: 10px 12px;
                margin-bottom: 6px;
            }

            .ritt-name {
                font-size: 13px;
            }

            .ritt-details {
                gap: 8px;
                font-size: 11px;
            }

            .ritt-card:hover {
                transform: none;
            }
        }

        /* Ekstra liten skjerm (f.eks. iPhone SE) */
        @media (max-width: 380px) {
            .nav-title {
                font-size: 13px;
            }

            .nav-link {
                padding: 5px 8px;
                font-size: 11px;
            }

            .map-container {
                height: 50vh;
                min-height: 250px;
            }

            .sidebar {
                max-height: 50vh;
            }
        }
    </style>
</head>
<body>

<nav class="nav">

<script>

//  KATEGORIER

// =============================================================

    { name: "Bioracer-cup #1",                  catKey: "bioracer",   start: "06.05.2026", end: "06.05.2026", location: "Prestmoen",                 club: "Stjørdals-Blink", lat: 63.451815, lng: 10.991306 },
    { name: "Bioracer-cup #2",                  catKey: "bioracer",   start: "20.05.2026", end: "20.05.2026", location: "Lånkebanen",                club: "Stjørdals-Blink", lat: 63.406884, lng: 10.913933 },

    { name: "IF Frøys Jokerfestival",           catKey: "ncfranking", start: "21.08.2026", end: "23.08.2026", location: "Ås",                        club: "Frøy SK",         lat: 59.6655, lng: 10.7891 },

    { name: "Lillehammer Sykkelfestival",       catKey: "ncfranking", start: "11.09.2026", end: "13.09.2026", location: "Lillehammer",               club: "Lillehammer CK",  lat: 61.1200, lng: 10.4700 },

    { name: "Sørlandet Petit Prix",             catKey: "ncfranking", start: "08.08.2026", end: "09.08.2026", location: "Kristiansand",              club: "Kristiansand CK", lat: 58.146,  lng: 7.995      },

// =============================================================
//  HJELPEFUNKSJONER
// =============================================================
function parseDate(str) {
    const [d, m, y] = str.split('.');
    return new Date(y, m - 1, d);
}

function prepareData(data) {
    return data
        .sort((a, b) => parseDate(a.start) - parseDate(b.start))
        .map((r, i) => ({
            ...r, id: i + 1,
            location: r.location || null,
            club: r.club || '',
            lat: r.lat || null,
            lng: r.lng || null
        }));
}

const ritts        = prepareData(rittData);
const getCat       = (k) => CATEGORIES[k] || CATEGORIES.trening;
const hasLocation  = (r) => r.lat != null && r.lng != null;
const dateRange    = (s, e) => s === e ? s : `${s} – ${e}`;

function badgeStyle(catKey) {
    const c = getCat(catKey).color;
    return `background:${c}14; color:${c}; border:1px solid ${c}40;`;
}

const ICONS = {
    pin:    `<svg fill="none" stroke="#4a6aa5" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
    cal:    (c = '#4a6aa5') => `<svg fill="none" stroke="${c}" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
    person: `<svg fill="none" stroke="#4a6aa5" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>`
};

// =============================================================
//  UI-OPPSETT
// =============================================================
function buildStatsBar() {
    const medSted = ritts.filter(hasLocation);
    const steder  = new Set(medSted.map(r => r.location)).size;
    document.getElementById('statsBar').innerHTML = `
        <div class="stat-item"><strong>${ritts.length}</strong> ritt totalt</div>
        <div class="stat-item"><strong>${steder}</strong> steder</div>
        <div class="stat-item"><strong>Apr–Sep</strong> sesong</div>`;
}

function buildFilterButtons() {
    const el = document.getElementById('filterButtons');
    el.innerHTML = `<button class="filter-btn active-all" data-filter="all">Alle</button>` +
        Object.entries(CATEGORIES).map(([k, v]) =>
            `<button class="filter-btn" data-filter="${k}">${v.label}</button>`
        ).join('');
    el.querySelectorAll('.filter-btn').forEach(btn =>
        btn.addEventListener('click', () => filterRitt(btn.dataset.filter, btn))
    );
}

function buildLegend() {
    document.getElementById('legendBox').innerHTML = '<h4>Kategorier</h4>' +
        Object.values(CATEGORIES).map(c =>
            `<div class="legend-item"><div class="legend-dot" style="background:${c.color}"></div>${c.label}</div>`
        ).join('');
}

function buildRouteInfo() {
    document.getElementById('routeInfo').innerHTML =
        `<strong>${ritts.length} ritt</strong> over hele Norge`;
}

// =============================================================
//  LEGENDE TOGGLE (mobil)
// =============================================================
function setupLegendToggle() {
    const toggleBtn = document.getElementById('legendToggle');
    const legendBox = document.getElementById('legendBox');

    toggleBtn.addEventListener('click', () => {
        legendBox.classList.toggle('visible');
        toggleBtn.classList.toggle('active');
    });

    // Lukk legenden når man trykker på kartet (mobil)
    document.getElementById('map').addEventListener('click', () => {
        if (window.innerWidth <= 768) {
            legendBox.classList.remove('visible');
            toggleBtn.classList.remove('active');
        }
    });
}

// =============================================================
//  KART
// =============================================================
const map = L.map('map', { zoomControl: false }).setView([61.5, 10.5], 6);
L.control.zoom({ position: 'topleft' }).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const markers = {};
let currentFilter = 'all';

function createIcon(color, num) {
    return L.divIcon({
        className: 'custom-marker',
        html: `<div class="pulse-ring" style="border:3px solid ${color}"></div>
               <div class="marker-pin" style="background:${color}"><span class="marker-number">${num}</span></div>`,
        iconSize: [36, 36], iconAnchor: [18, 36], popupAnchor: [0, -36]
    });
}

function popupHTML(r) {
    return `
        <div class="popup-badge" style="${badgeStyle(r.catKey)}">${getCat(r.catKey).label}</div>
        <div class="popup-title">${r.name}</div>
        <div class="popup-info">
            <strong>📍 Sted:</strong> ${r.location}<br>
            <strong>📅 Dato:</strong> ${dateRange(r.start, r.end)}<br>
            <strong>🏢 Arrangør:</strong> ${r.club}
        </div>`;
}

function addMarkers() {
    let n = 0;
    ritts.forEach(r => {
        if (!hasLocation(r)) return;
        n++;
        const m = L.marker([r.lat, r.lng], { icon: createIcon(getCat(r.catKey).color, n) })
            .bindPopup(popupHTML(r), { className: 'custom-popup', maxWidth: 280 })
            .addTo(map);
        m.on('click', () => highlightCard(r.id));
        markers[r.id] = m;
    });
}

// =============================================================
//  SIDEBAR
// =============================================================
function buildSidebar() {
    const el = document.getElementById('rittList');
    el.innerHTML = '';
    let counter = 0;

    ritts.forEach(r => {
        if (currentFilter !== 'all' && r.catKey !== currentFilter) return;
        const cat  = getCat(r.catKey);
        const dato = dateRange(r.start, r.end);

        if (!hasLocation(r)) {
            el.insertAdjacentHTML('beforeend', `
                <div class="no-location-card">
                    <div class="ritt-card-header">
                        <div class="ritt-name" style="padding-left:0">${r.name}</div>
                        <span class="ritt-category-badge" style="${badgeStyle(r.catKey)}">${cat.label}</span>
                    </div>
                    <div class="ritt-details" style="padding-left:0">
                        <div class="ritt-detail-item">${ICONS.cal('#8a9cc2')} ${dato}</div>
                    </div>
                </div>`);
            return;
        }

        counter++;
        const card = document.createElement('div');
        card.className = 'ritt-card';
        card.dataset.id = r.id;
        card.style.borderLeft = `4px solid ${cat.color}`;
        card.onclick = () => flyToRitt(r.id);
        card.innerHTML = `
            <div class="ritt-card-header">
                <div class="ritt-name">${counter}. ${r.name}</div>
                <span class="ritt-category-badge" style="${badgeStyle(r.catKey)}">${cat.label}</span>
            </div>
            <div class="ritt-details">
                <div class="ritt-detail-item">${ICONS.pin} ${r.location}</div>
                <div class="ritt-detail-item">${ICONS.cal()} ${dato}</div>
                <div class="ritt-detail-item">${ICONS.person} ${r.club}</div>
            </div>`;
        el.appendChild(card);
    });
}

// =============================================================
//  INTERAKSJON
// =============================================================
function flyToRitt(id) {
    const r = ritts.find(x => x.id === id);
    if (!r || !hasLocation(r)) return;
    map.flyTo([r.lat, r.lng], 11, { duration: 1 });
    setTimeout(() => markers[id]?.openPopup(), 1100);
    highlightCard(id);

    // På mobil: scroll opp til kartet
    if (window.innerWidth <= 768) {
        document.querySelector('.map-container').scrollIntoView({ behavior: 'smooth' });
    }
}

function highlightCard(id) {
    document.querySelectorAll('.ritt-card').forEach(c => c.classList.remove('highlighted'));
    const card = document.querySelector(`.ritt-card[data-id="${id}"]`);
    if (card) {
        card.classList.add('highlighted');
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
}

function filterRitt(catKey, btn) {
    currentFilter = catKey;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active', 'active-all'));
    btn.classList.add(catKey === 'all' ? 'active-all' : 'active');

    Object.values(markers).forEach(m => map.removeLayer(m));
    const pts = [];
    let n = 0;
    ritts.forEach(r => {
        if (!hasLocation(r)) return;
        if (catKey !== 'all' && r.catKey !== catKey) return;
        n++;
        markers[r.id].setIcon(createIcon(getCat(r.catKey).color, n));
        markers[r.id].addTo(map);
        pts.push([r.lat, r.lng]);
    });

    if (pts.length > 1) map.fitBounds(L.latLngBounds(pts), { padding: [50, 50] });
    else if (pts.length === 1) map.setView(pts[0], 10);
    buildSidebar();
}

function fitMapToAll() {
    const pts = ritts.filter(hasLocation).map(r => [r.lat, r.lng]);
    if (pts.length) map.fitBounds(L.latLngBounds(pts), { padding: [50, 50] });
}

// =============================================================
//  HÅNDTER RESIZE — Oppdater kart ved orientasjonsendring
// =============================================================
function handleResize() {
    setTimeout(() => {
        map.invalidateSize();
    }, 200);
}

window.addEventListener('resize', handleResize);
window.addEventListener('orientationchange', handleResize);

// =============================================================
//  INIT
// =============================================================
buildStatsBar();
buildFilterButtons();
buildLegend();
buildRouteInfo();
addMarkers();
buildSidebar();
fitMapToAll();
setupLegendToggle();
</script>

</body>
</html>
